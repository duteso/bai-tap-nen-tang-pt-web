<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout E-Commerce</title>
    <link rel="stylesheet" href="css/grid.css">
</head>
<body>
    <div class="wrapper">
        <header>HEADER</header>
        
        <section class="hero">HERO BANNER</section>
        
        <aside class="sidebar">
            <h3>Filter</h3>
            <input type="checkbox"> Laptop <br>
            <input type="checkbox"> Phone <br>
            <input type="checkbox"> Keyboard
        </aside>
        
        <main class="main-content">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card :hover">Card 3</div>
            <div class="card">Card 4</div>
            <div class="card">Card 5</div>
            <div class="card">Card 6</div>
        </main>
        
        <aside class="ads">
            <img src="https://placehold.co/180x400" alt="Ads">
        </aside>
        
        <footer>FOOTER</footer>
    </div>
</body>
</html>
