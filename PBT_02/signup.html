<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng ký</title>
</head>
<body>
    <header></header>
    <main>
        <form action="#" method="POST">
            <fieldset>
                <legend>Form đăng ký</legend>

                <label for="email">Email:</label>
                <input type="email" required id="email" name="email" placeholder="abc@gmail.com">

                <label for="password">Mật khẩu</label>
                <input type="password" id="password" required minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Ít nhất 8 ký tự, gồm chữ hoa, thường và số">

                <label for="sdt">Số điện thoại</label>
                <input type="tel" pattern="[0-9]{10}" placeholder="0123456789">

                <label for="dob">Ngày sinh</label>
                <input type="date" name="dob" id="dob" max="2026-04-29">
            </fieldset>
            <label for="agree">
                <input type="checkbox" id="agree">
                Tôi đồng ý
            </label>
            <button type="submit">Gửi</button>
        </form>
    </main>
    <footer></footer>
</body>
</html>
