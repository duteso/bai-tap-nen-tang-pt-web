<form action="#">
    <!-- Trường hợp 1 -->
    <input type="text" required value="">
    <br><br>

    <!-- Trường hợp 2 -->
    <input type="email" required value="abc">
    <br><br>

    <!-- Trường hợp 3 -->
    <input type="number" min="1" max="10" required value="15">
    <br><br>

    <!-- Trường hợp 4 -->
    <input type="text" pattern="[0-9]{10}" required value="abc123">
    <br><br>

    <!-- Trường hợp 5 -->
    <input type="password" minlength="8" required value="123">
    <br><br>

    <button type="submit">Submit</button>
</form>
