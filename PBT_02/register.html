<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng ký tài khoản</title>
</head>
<body>
    <form action="#" method="POST">
            <fieldset>
                <legend>Thông tin cá nhân</legend>
                <label for="name">Họ tên</label>
                <input id="name" type="text" required minlength="2" maxlength="50" placeholder="VD: Nguyễn Văn A">
                <br><br>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="abc@gmail.com">
                <br><br>
                <label for="sdt">Số điện thoại</label>
                <input type="tel" id="sdt" pattern="0[0-9]{9}" placeholder="0123456789">
                <br><br>
                <label for="ngaysinh">Ngày sinh</label>
                <input type="date" id="ngaysinh" max="2026-04-28" placeholder="Ngày sinh trước 28/4/2026">
            </fieldset>
            <fieldset>
                <legend>Tài khoản</legend>
                <label for="username">Tên tài khoản</label>
                <input type="text" id="username" pattern="[A-Za-z0-9_]+" minlength="3" maxlength="20" placeholder="VD: ABCxyz123">
                <br><br>
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" pattern="(?=.*[A-Z])(?=.*[0-9])" minlength="8" placeholder="ABCxyz123_">
                <br><br>
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" title="Ít nhất 8 ký tự, gồm 1 chữ hoa và 1 số" placeholder="ABCxyz123_">
            </fieldset>
            <fieldset>
                <legend>Thông tin giao hàng</legend>
                <label for="city">Tỉnh/Thành phố</label>
                <select id="city">
                    <option value="bg">Bắc Giang</option>
                    <option value="bn">Bắc Ninh</option>
                    <option value="bk1">Bắc Kạn</option>
                    <option value="bk2">Bắc Kinh</option>
                    <option value="bh">Bắc Hải</option>
                </select>
                <label for="city1">Quận/Huyện</label>
                <select name="city1" id="city1">
                    <option value="#">#</option>
                </select>
                <br><br>
                <label for="details">Địa chỉ chi tiết</label>
                <textarea name="details" id="details" rows="3" placeholder="VD: Số 53, Tân Triều"></textarea>
                </fieldset>
                <br><br>
                <fieldset>
                    <legend>Giới tính</legend>
                        <input type="radio" id="nam" name="gt">
                        <label for="nam">Nam</label>
                        <input type="radio" id="nu" name="gt">
                        <label for="nu">Nữ</label>
                        <input type="radio" id="khac" name="gt">
                        <label for="khac">Khác</label>
                </fieldset>
            <br><br>
            <input type="checkbox" name="dieukhoan" id="dieukhoan" required>
            <label for="dieukhoan">Tôi đồng ý với <a href="#">điều khoản</a></label>
            <br><br>
            <button type="submit">Gửi</button>
            <button type="reset">Xóa biểu mẫu</button>
    </form>
</body>
</html>
